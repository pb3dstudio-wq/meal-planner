<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buckley Meal Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --warm-white: #fff9f2;
      --brown: #3b2a1a;
      --brown-light: #6b4f35;
      --accent: #c8623a;
      --accent-light: #e8845e;
      --green: #4a7c59;
      --green-light: #6a9e78;
      --gold: #d4a84b;
      --border: #e2d9ce;
      --shadow: 0 4px 24px rgba(59,42,26,0.10);
      --shadow-lg: 0 8px 40px rgba(59,42,26,0.15);
      --radius: 16px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--brown);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--brown);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,0.18);
      height: 64px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--cream);
      letter-spacing: 0.02em;
    }
    .logo span { color: var(--gold); }
    nav { display: flex; gap: 0.25rem; }
    nav button {
      background: none;
      border: none;
      color: #c9b89e;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    nav button:hover { color: var(--cream); background: rgba(255,255,255,0.08); }
    nav button.active { color: var(--gold); background: rgba(212,168,75,0.15); }

    /* ── PAGES ── */
    .page { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .page.active { display: block; }

    /* ── PAGE HEADERS ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--brown);
    }
    .page-title small {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--brown-light);
      margin-top: 0.2rem;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(200,98,58,0.3); }
    .btn-secondary { background: var(--border); color: var(--brown); }
    .btn-secondary:hover { background: #d6cdc2; }
    .btn-green { background: var(--green); color: white; }
    .btn-green:hover { background: var(--green-light); }
    .btn-danger { background: #e05555; color: white; }
    .btn-danger:hover { background: #c44; }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }
    .btn-icon { padding: 0.5rem; border-radius: 8px; background: var(--border); color: var(--brown); border: none; cursor: pointer; transition: all 0.2s; font-size: 1rem; }
    .btn-icon:hover { background: var(--accent); color: white; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30,15,5,0.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--warm-white);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
    .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--brown-light); padding: 0.25rem; border-radius: 6px; transition: all 0.2s; }
    .modal-close:hover { background: var(--border); }

    /* ── FORMS ── */
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--brown-light); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em; }
    input[type=text], input[type=number], input[type=url], textarea, select {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      background: white;
      color: var(--brown);
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { min-height: 90px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }

    /* ── INGREDIENT BUILDER ── */
    .ingredient-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.5rem; }
    .ingredient-row { display: flex; gap: 0.5rem; align-items: center; }
    .ingredient-row input { flex: 1; }
    .ingredient-row input.qty { width: 80px; flex: none; }
    .ingredient-row input.unit { width: 90px; flex: none; }
    .add-ingredient-btn { background: none; border: 1.5px dashed var(--border); color: var(--brown-light); padding: 0.5rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; width: 100%; transition: all 0.2s; margin-top: 0.25rem; }
    .add-ingredient-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── RECIPE CARDS ── */
    .recipes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
    .recipe-card {
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: all 0.25s;
      cursor: pointer;
      border: 1.5px solid transparent;
    }
    .recipe-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
    .recipe-card-img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      background: linear-gradient(135deg, #e8d5c4, #d4b896);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .recipe-card-img img { width: 100%; height: 100%; object-fit: cover; }
    .recipe-card-body { padding: 1.1rem; }
    .recipe-card-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--brown); }
    .recipe-card-meta { display: flex; gap: 0.75rem; font-size: 0.8rem; color: var(--brown-light); margin-bottom: 0.75rem; }
    .recipe-card-meta span { display: flex; align-items: center; gap: 0.25rem; }
    .recipe-card-actions { display: flex; gap: 0.5rem; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--brown-light); }
    .empty-state .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 1rem; }

    /* ── RECIPE DETAIL ── */
    .recipe-detail { background: white; border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); }
    .recipe-detail-img { width: 100%; height: 260px; object-fit: cover; border-radius: var(--radius-sm); margin-bottom: 1.5rem; background: linear-gradient(135deg, #e8d5c4, #d4b896); display: flex; align-items: center; justify-content: center; font-size: 5rem; }
    .recipe-detail-img img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-sm); }
    .recipe-detail-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 0.75rem; }
    .recipe-meta-row { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .meta-badge { background: var(--cream); border: 1px solid var(--border); border-radius: 20px; padding: 0.35rem 0.85rem; font-size: 0.85rem; color: var(--brown-light); display: flex; align-items: center; gap: 0.35rem; }
    .section-label { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin: 1.25rem 0 0.75rem; color: var(--brown); }
    .ingredient-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0; border-bottom: 1px solid var(--cream); font-size: 0.95rem; }
    .ingredient-item::before { content: '•'; color: var(--accent); font-size: 1.2rem; }
    .method-text { line-height: 1.8; font-size: 0.95rem; color: var(--brown); white-space: pre-wrap; }
    .back-btn { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--brown-light); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 0.4rem 0; margin-bottom: 1.25rem; transition: color 0.2s; }
    .back-btn:hover { color: var(--accent); }

    /* ── MEAL PLANNER ── */
    .planner-controls { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .month-nav { display: flex; align-items: center; gap: 0.75rem; }
    .month-nav button { background: var(--border); border: none; border-radius: 8px; padding: 0.4rem 0.75rem; cursor: pointer; font-size: 1rem; transition: all 0.2s; color: var(--brown); }
    .month-nav button:hover { background: var(--accent); color: white; }
    .month-label { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 600; min-width: 180px; text-align: center; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .calendar-day-header { text-align: center; font-size: 0.75rem; font-weight: 600; color: var(--brown-light); text-transform: uppercase; letter-spacing: 0.06em; padding: 0.5rem 0; }
    .calendar-day {
      background: white;
      border-radius: var(--radius-sm);
      min-height: 90px;
      padding: 0.5rem;
      border: 1.5px solid var(--border);
      transition: all 0.2s;
      position: relative;
    }
    .calendar-day.empty { background: transparent; border-color: transparent; }
    .calendar-day:not(.empty):hover { border-color: var(--accent); }
    .calendar-day.today { border-color: var(--gold); background: #fffbf0; }
    .day-number { font-size: 0.8rem; font-weight: 600; color: var(--brown-light); margin-bottom: 0.35rem; }
    .calendar-day.today .day-number { color: var(--gold); }
    .meal-slot { margin-bottom: 0.25rem; }
    .meal-chip {
      background: var(--accent);
      color: white;
      border-radius: 4px;
      padding: 0.15rem 0.4rem;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.25rem;
      line-height: 1.4;
    }
    .meal-chip.lunch { background: var(--green); }
    .meal-chip.dinner { background: var(--brown-light); }
    .meal-chip-remove { background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 0.75rem; padding: 0; line-height: 1; flex-shrink: 0; }
    .meal-chip-remove:hover { color: white; }
    .add-meal-btn { background: none; border: 1px dashed var(--border); color: var(--border); border-radius: 4px; padding: 0.15rem 0; font-size: 0.7rem; width: 100%; cursor: pointer; transition: all 0.2s; margin-top: 0.2rem; }
    .add-meal-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* meal type picker in modal */
    .meal-type-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .meal-type-btn { flex: 1; padding: 0.5rem; border: 1.5px solid var(--border); border-radius: 8px; background: white; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; transition: all 0.2s; color: var(--brown); }
    .meal-type-btn.selected { border-color: var(--accent); background: #fdf0eb; color: var(--accent); font-weight: 500; }

    /* recipe picker in modal */
    .recipe-search { margin-bottom: 0.75rem; }
    .recipe-pick-list { max-height: 280px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .recipe-pick-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 0.9rem; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--cream); }
    .recipe-pick-item:last-child { border-bottom: none; }
    .recipe-pick-item:hover { background: var(--cream); }
    .recipe-pick-item.selected { background: #fdf0eb; }
    .recipe-pick-thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; background: linear-gradient(135deg, #e8d5c4, #d4b896); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; overflow: hidden; }
    .recipe-pick-thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* ── SHOPPING LIST ── */
    .shopping-controls { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .week-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .week-btn { padding: 0.45rem 1rem; border: 1.5px solid var(--border); border-radius: 20px; background: white; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; transition: all 0.2s; color: var(--brown); }
    .week-btn.active { background: var(--green); border-color: var(--green); color: white; }
    .shopping-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .shopping-category { background: white; border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); }
    .shopping-category-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; color: var(--brown); }
    .shopping-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0; border-bottom: 1px solid var(--cream); font-size: 0.9rem; }
    .shopping-item:last-child { border-bottom: none; }
    .shopping-item input[type=checkbox] { accent-color: var(--green); width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .shopping-item label { cursor: pointer; flex: 1; }
    .shopping-item.checked label { text-decoration: line-through; color: var(--brown-light); }
    .shopping-meals { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
    .shopping-meal-card { background: white; border-radius: var(--radius-sm); padding: 0.9rem 1.1rem; border: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; }
    .shopping-meal-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .shopping-meal-dot.lunch { background: var(--green); }
    .shopping-meal-dot.dinner { background: var(--brown-light); }
    .no-meals { text-align: center; padding: 2rem; color: var(--brown-light); font-size: 0.95rem; }
    .print-btn { margin-left: auto; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--brown);
      color: var(--cream);
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 3rem; color: var(--brown-light); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 700px) {
      .calendar { grid-template-columns: repeat(7, 1fr); gap: 3px; }
      .calendar-day { min-height: 60px; padding: 0.3rem; }
      .recipes-grid { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
      nav button { font-size: 0.78rem; padding: 0.4rem 0.6rem; }
      .page { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Buckley <span>Meals</span></div>
  <nav>
    <button class="active" onclick="showPage('recipes')">🍳 Recipes</button>
    <button onclick="showPage('planner')">📅 Planner</button>
    <button onclick="showPage('shopping')">🛒 Shopping</button>
  </nav>
</header>

<!-- ════════════ RECIPES PAGE ════════════ -->
<div id="page-recipes" class="page active">
  <div class="page-header">
    <div class="page-title">My Recipes <small>Your personal recipe collection</small></div>
    <button class="btn btn-primary" onclick="openAddRecipe()">＋ Add Recipe</button>
  </div>
  <div id="recipes-container">
    <div class="loading"><div class="spinner"></div>Loading recipes…</div>
  </div>
</div>

<!-- ════════════ RECIPE DETAIL PAGE ════════════ -->
<div id="page-recipe-detail" class="page">
  <button class="back-btn" onclick="showPage('recipes')">← Back to Recipes</button>
  <div id="recipe-detail-content"></div>
</div>

<!-- ════════════ PLANNER PAGE ════════════ -->
<div id="page-planner" class="page">
  <div class="page-header">
    <div class="page-title">Meal Planner <small>Plan your meals for the month</small></div>
  </div>
  <div class="planner-controls">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="month-label"></div>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="calendar" id="calendar-grid"></div>
</div>

<!-- ════════════ SHOPPING PAGE ════════════ -->
<div id="page-shopping" class="page">
  <div class="page-header">
    <div class="page-title">Shopping List <small>Generated from your meal plan</small></div>
    <button class="btn btn-secondary print-btn" onclick="window.print()">🖨️ Print</button>
  </div>
  <div class="shopping-controls">
    <div class="week-selector" id="week-selector"></div>
  </div>
  <div id="shopping-content">
    <div class="no-meals">Select a week above to generate your shopping list.</div>
  </div>
</div>

<!-- ════════════ ADD/EDIT RECIPE MODAL ════════════ -->
<div class="modal-overlay" id="recipe-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="recipe-modal-title">Add Recipe</div>
      <button class="modal-close" onclick="closeModal('recipe-modal')">✕</button>
    </div>
    <div class="form-group">
      <label>Recipe Name *</label>
      <input type="text" id="r-name" placeholder="e.g. Spaghetti Bolognese"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Prep Time</label>
        <input type="text" id="r-prep" placeholder="e.g. 15 mins"/>
      </div>
      <div class="form-group">
        <label>Cook Time</label>
        <input type="text" id="r-cook" placeholder="e.g. 30 mins"/>
      </div>
    </div>
    <div class="form-group">
      <label>Servings</label>
      <input type="number" id="r-servings" placeholder="e.g. 4" min="1"/>
    </div>
    <div class="form-group">
      <label>Image URL (optional)</label>
      <input type="url" id="r-image" placeholder="Paste an image link from the web"/>
    </div>
    <div class="form-group">
      <label>Ingredients</label>
      <div class="ingredient-list" id="ingredient-list"></div>
      <button class="add-ingredient-btn" onclick="addIngredientRow()">+ Add ingredient</button>
    </div>
    <div class="form-group">
      <label>Method / Instructions</label>
      <textarea id="r-method" placeholder="Describe how to make this recipe…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('recipe-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveRecipe()">Save Recipe</button>
    </div>
  </div>
</div>

<!-- ════════════ ADD MEAL MODAL ════════════ -->
<div class="modal-overlay" id="meal-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="meal-modal-title">Add Meal</div>
      <button class="modal-close" onclick="closeModal('meal-modal')">✕</button>
    </div>
    <div class="form-group">
      <label>Meal Type</label>
      <div class="meal-type-row">
        <button class="meal-type-btn selected" data-type="breakfast" onclick="selectMealType(this)">🌅 Breakfast</button>
        <button class="meal-type-btn" data-type="lunch" onclick="selectMealType(this)">☀️ Lunch</button>
        <button class="meal-type-btn" data-type="dinner" onclick="selectMealType(this)">🌙 Dinner</button>
      </div>
    </div>
    <div class="form-group">
      <label>Search Recipe</label>
      <input type="text" class="recipe-search" id="recipe-search-input" placeholder="Type to filter…" oninput="filterRecipePicker()"/>
    </div>
    <div class="recipe-pick-list" id="recipe-pick-list"></div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('meal-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAddMeal()">Add to Plan</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, setDoc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBoo0wmdCi08yC6UBr0HR18pVfLE15MlBM",
    authDomain: "buckley-mealsapp.firebaseapp.com",
    projectId: "buckley-mealsapp",
    storageBucket: "buckley-mealsapp.firebasestorage.app",
    messagingSenderId: "423146541984",
    appId: "1:423146541984:web:f0bc4f70423f3b9cac0ac5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── STATE ──
  let recipes = [];
  let mealPlan = {}; // { "YYYY-MM-DD": [{type, recipeId}] }
  let currentMonth = new Date().getMonth();
  let currentYear = new Date().getFullYear();
  let editingRecipeId = null;
  let addMealDate = null;
  let selectedMealType = 'breakfast';
  let selectedRecipeId = null;
  let currentShoppingWeek = null;
  let checkedItems = {};

  // ── EXPOSE GLOBALS ──
  window.showPage = showPage;
  window.openAddRecipe = openAddRecipe;
  window.closeModal = closeModal;
  window.addIngredientRow = addIngredientRow;
  window.saveRecipe = saveRecipe;
  window.viewRecipe = viewRecipe;
  window.editRecipe = editRecipe;
  window.deleteRecipe = deleteRecipe;
  window.changeMonth = changeMonth;
  window.openAddMeal = openAddMeal;
  window.selectMealType = selectMealType;
  window.filterRecipePicker = filterRecipePicker;
  window.confirmAddMeal = confirmAddMeal;
  window.removeMeal = removeMeal;
  window.selectShoppingWeek = selectShoppingWeek;

  // ── NAVIGATION ──
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    const idx = ['recipes','planner','shopping'].indexOf(name);
    if (idx >= 0) document.querySelectorAll('nav button')[idx].classList.add('active');
    if (name === 'planner') renderCalendar();
    if (name === 'shopping') renderShoppingPage();
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  // ── RECIPES ──
  async function loadRecipes() {
    const snap = await getDocs(collection(db, 'recipes'));
    recipes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderRecipes();
  }

  function renderRecipes() {
    const c = document.getElementById('recipes-container');
    if (!recipes.length) {
      c.innerHTML = `<div class="empty-state"><div class="empty-icon">🍽️</div><p>No recipes yet — add your first one!</p></div>`;
      return;
    }
    c.innerHTML = `<div class="recipes-grid">${recipes.map(recipeCard).join('')}</div>`;
  }

  function recipeCard(r) {
    const img = r.image
      ? `<div class="recipe-card-img"><img src="${r.image}" alt="${r.name}" onerror="this.parentElement.innerHTML='🍽️'"/></div>`
      : `<div class="recipe-card-img">🍽️</div>`;
    return `<div class="recipe-card" onclick="viewRecipe('${r.id}')">
      ${img}
      <div class="recipe-card-body">
        <div class="recipe-card-name">${r.name}</div>
        <div class="recipe-card-meta">
          ${r.prep ? `<span>⏱ ${r.prep}</span>` : ''}
          ${r.servings ? `<span>👤 ${r.servings}</span>` : ''}
        </div>
        <div class="recipe-card-actions">
          <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); editRecipe('${r.id}')">✏️ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteRecipe('${r.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  }

  function viewRecipe(id) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    const img = r.image
      ? `<div class="recipe-detail-img"><img src="${r.image}" alt="${r.name}" onerror="this.parentElement.innerHTML='🍽️'"/></div>`
      : `<div class="recipe-detail-img">🍽️</div>`;
    const ings = (r.ingredients || []).map(i =>
      `<div class="ingredient-item">${i.qty ? i.qty + ' ' : ''}${i.unit ? i.unit + ' ' : ''}${i.name}</div>`
    ).join('');
    document.getElementById('recipe-detail-content').innerHTML = `
      <div class="recipe-detail">
        ${img}
        <div class="recipe-detail-title">${r.name}</div>
        <div class="recipe-meta-row">
          ${r.prep ? `<div class="meta-badge">⏱ Prep: ${r.prep}</div>` : ''}
          ${r.cook ? `<div class="meta-badge">🔥 Cook: ${r.cook}</div>` : ''}
          ${r.servings ? `<div class="meta-badge">👤 Serves ${r.servings}</div>` : ''}
        </div>
        ${ings ? `<div class="section-label">Ingredients</div>${ings}` : ''}
        ${r.method ? `<div class="section-label">Method</div><div class="method-text">${r.method}</div>` : ''}
      </div>`;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-recipe-detail').classList.add('active');
  }

  function openAddRecipe() {
    editingRecipeId = null;
    document.getElementById('recipe-modal-title').textContent = 'Add Recipe';
    document.getElementById('r-name').value = '';
    document.getElementById('r-prep').value = '';
    document.getElementById('r-cook').value = '';
    document.getElementById('r-servings').value = '';
    document.getElementById('r-image').value = '';
    document.getElementById('r-method').value = '';
    document.getElementById('ingredient-list').innerHTML = '';
    addIngredientRow();
    document.getElementById('recipe-modal').classList.add('open');
  }

  function editRecipe(id) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    editingRecipeId = id;
    document.getElementById('recipe-modal-title').textContent = 'Edit Recipe';
    document.getElementById('r-name').value = r.name || '';
    document.getElementById('r-prep').value = r.prep || '';
    document.getElementById('r-cook').value = r.cook || '';
    document.getElementById('r-servings').value = r.servings || '';
    document.getElementById('r-image').value = r.image || '';
    document.getElementById('r-method').value = r.method || '';
    const list = document.getElementById('ingredient-list');
    list.innerHTML = '';
    (r.ingredients || [{ qty:'', unit:'', name:'' }]).forEach(i => addIngredientRow(i));
    document.getElementById('recipe-modal').classList.add('open');
  }

  function addIngredientRow(data = {}) {
    const row = document.createElement('div');
    row.className = 'ingredient-row';
    row.innerHTML = `
      <input type="text" class="qty" placeholder="Qty" value="${data.qty || ''}"/>
      <input type="text" class="unit" placeholder="Unit" value="${data.unit || ''}"/>
      <input type="text" placeholder="Ingredient name" value="${data.name || ''}"/>
      <button class="btn-icon" onclick="this.parentElement.remove()" title="Remove">✕</button>`;
    document.getElementById('ingredient-list').appendChild(row);
  }

  async function saveRecipe() {
    const name = document.getElementById('r-name').value.trim();
    if (!name) { toast('Please enter a recipe name'); return; }
    const rows = document.querySelectorAll('#ingredient-list .ingredient-row');
    const ingredients = Array.from(rows).map(r => ({
      qty: r.querySelector('.qty').value.trim(),
      unit: r.querySelector('.unit').value.trim(),
      name: r.querySelectorAll('input')[2].value.trim()
    })).filter(i => i.name);
    const data = {
      name,
      prep: document.getElementById('r-prep').value.trim(),
      cook: document.getElementById('r-cook').value.trim(),
      servings: document.getElementById('r-servings').value.trim(),
      image: document.getElementById('r-image').value.trim(),
      method: document.getElementById('r-method').value.trim(),
      ingredients
    };
    if (editingRecipeId) {
      await updateDoc(doc(db, 'recipes', editingRecipeId), data);
      toast('Recipe updated ✓');
    } else {
      await addDoc(collection(db, 'recipes'), data);
      toast('Recipe saved ✓');
    }
    closeModal('recipe-modal');
    await loadRecipes();
  }

  async function deleteRecipe(id) {
    if (!confirm('Delete this recipe?')) return;
    await deleteDoc(doc(db, 'recipes', id));
    toast('Recipe deleted');
    await loadRecipes();
  }

  // ── MEAL PLANNER ──
  async function loadMealPlan() {
    const snap = await getDocs(collection(db, 'mealplan'));
    mealPlan = {};
    snap.docs.forEach(d => { mealPlan[d.id] = d.data().meals || []; });
  }

  function renderCalendar() {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('month-label').textContent = `${months[currentMonth]} ${currentYear}`;
    const grid = document.getElementById('calendar-grid');
    const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const today = new Date();
    let html = days.map(d => `<div class="calendar-day-header">${d}</div>`).join('');
    const firstDay = new Date(currentYear, currentMonth, 1);
    let startDow = firstDay.getDay(); // 0=Sun
    startDow = startDow === 0 ? 6 : startDow - 1; // Convert to Mon=0
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    for (let i = 0; i < startDow; i++) html += `<div class="calendar-day empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
      const meals = mealPlan[dateStr] || [];
      const mealChips = meals.map((m, i) => {
        const r = recipes.find(x => x.id === m.recipeId);
        const name = r ? r.name : '?';
        const cls = m.type === 'lunch' ? 'lunch' : m.type === 'dinner' ? 'dinner' : '';
        return `<div class="meal-chip ${cls}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80px">${name}</span><button class="meal-chip-remove" onclick="removeMeal('${dateStr}',${i})">✕</button></div>`;
      }).join('');
      html += `<div class="calendar-day${isToday?' today':''}">
        <div class="day-number">${d}</div>
        ${mealChips}
        <button class="add-meal-btn" onclick="openAddMeal('${dateStr}')">+ add</button>
      </div>`;
    }
    grid.innerHTML = html;
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
    renderShoppingWeekSelector();
  }

  function openAddMeal(dateStr) {
    addMealDate = dateStr;
    selectedMealType = 'breakfast';
    selectedRecipeId = null;
    document.querySelectorAll('.meal-type-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector('[data-type="breakfast"]').classList.add('selected');
    document.getElementById('recipe-search-input').value = '';
    document.getElementById('meal-modal-title').textContent = `Add Meal — ${dateStr}`;
    renderRecipePicker(recipes);
    document.getElementById('meal-modal').classList.add('open');
  }

  function selectMealType(btn) {
    document.querySelectorAll('.meal-type-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMealType = btn.dataset.type;
  }

  function filterRecipePicker() {
    const q = document.getElementById('recipe-search-input').value.toLowerCase();
    renderRecipePicker(recipes.filter(r => r.name.toLowerCase().includes(q)));
  }

  function renderRecipePicker(list) {
    const el = document.getElementById('recipe-pick-list');
    if (!list.length) { el.innerHTML = '<div style="padding:1rem;text-align:center;color:#888">No recipes found</div>'; return; }
    el.innerHTML = list.map(r => {
      const thumb = r.image
        ? `<div class="recipe-pick-thumb"><img src="${r.image}" onerror="this.parentElement.innerHTML='🍽️'"/></div>`
        : `<div class="recipe-pick-thumb">🍽️</div>`;
      return `<div class="recipe-pick-item${selectedRecipeId===r.id?' selected':''}" onclick="pickRecipe('${r.id}', this)">
        ${thumb}<span>${r.name}</span>
      </div>`;
    }).join('');
  }

  window.pickRecipe = function(id, el) {
    selectedRecipeId = id;
    document.querySelectorAll('.recipe-pick-item').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
  };

  async function confirmAddMeal() {
    if (!selectedRecipeId) { toast('Please select a recipe'); return; }
    const meals = mealPlan[addMealDate] || [];
    meals.push({ type: selectedMealType, recipeId: selectedRecipeId });
    mealPlan[addMealDate] = meals;
    await setDoc(doc(db, 'mealplan', addMealDate), { meals });
    closeModal('meal-modal');
    renderCalendar();
    toast('Meal added ✓');
  }

  async function removeMeal(dateStr, index) {
    const meals = (mealPlan[dateStr] || []).filter((_, i) => i !== index);
    mealPlan[dateStr] = meals;
    await setDoc(doc(db, 'mealplan', dateStr), { meals });
    renderCalendar();
  }

  // ── SHOPPING LIST ──
  function getWeeksInMonth(year, month) {
    const weeks = [];
    const first = new Date(year, month, 1);
    const last = new Date(year, month + 1, 0);
    let current = new Date(first);
    let wk = 1;
    while (current <= last) {
      const start = new Date(current);
      const end = new Date(current);
      end.setDate(end.getDate() + 6);
      if (end > last) end.setTime(last.getTime());
      weeks.push({ label: `Week ${wk}`, start: new Date(start), end: new Date(end) });
      current.setDate(current.getDate() + 7);
      wk++;
    }
    return weeks;
  }

  function renderShoppingWeekSelector() {
    const weeks = getWeeksInMonth(currentYear, currentMonth);
    const sel = document.getElementById('week-selector');
    sel.innerHTML = weeks.map((w, i) =>
      `<button class="week-btn${currentShoppingWeek===i?' active':''}" onclick="selectShoppingWeek(${i})">${w.label}<br><small style="font-size:0.7rem;opacity:0.8">${fmtDate(w.start)}–${fmtDate(w.end)}</small></button>`
    ).join('');
  }

  function fmtDate(d) {
    return `${d.getDate()}/${d.getMonth()+1}`;
  }

  function renderShoppingPage() {
    renderShoppingWeekSelector();
    if (currentShoppingWeek !== null) generateShoppingList(currentShoppingWeek);
  }

  function selectShoppingWeek(i) {
    currentShoppingWeek = i;
    renderShoppingWeekSelector();
    generateShoppingList(i);
  }

  function generateShoppingList(weekIdx) {
    const weeks = getWeeksInMonth(currentYear, currentMonth);
    const week = weeks[weekIdx];
    if (!week) return;
    const content = document.getElementById('shopping-content');

    // Gather all meals in this week
    const allMeals = [];
    let d = new Date(week.start);
    while (d <= week.end) {
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      (mealPlan[key] || []).forEach(m => {
        const r = recipes.find(x => x.id === m.recipeId);
        if (r) allMeals.push({ date: key, type: m.type, recipe: r });
      });
      d.setDate(d.getDate() + 1);
    }

    if (!allMeals.length) {
      content.innerHTML = `<div class="no-meals">No meals planned for this week.<br>Add meals in the Planner tab first!</div>`;
      return;
    }

    // Aggregate ingredients
    const ingredientMap = {};
    allMeals.forEach(m => {
      (m.recipe.ingredients || []).forEach(ing => {
        if (!ing.name) return;
        const key = ing.name.toLowerCase();
        if (!ingredientMap[key]) ingredientMap[key] = { name: ing.name, entries: [] };
        ingredientMap[key].entries.push({ qty: ing.qty, unit: ing.unit });
      });
    });

    const mealsList = allMeals.map(m =>
      `<div class="shopping-meal-card">
        <div class="shopping-meal-dot ${m.type}"></div>
        <div>
          <strong>${m.recipe.name}</strong>
          <div style="font-size:0.8rem;color:var(--brown-light)">${m.date} · ${m.type}</div>
        </div>
      </div>`
    ).join('');

    const items = Object.values(ingredientMap).map((ing, idx) => {
      const qtyStr = ing.entries.map(e => `${e.qty||''} ${e.unit||''}`.trim()).filter(Boolean).join(', ');
      const ckid = `ck-${weekIdx}-${idx}`;
      const checked = checkedItems[ckid] ? 'checked' : '';
      return `<div class="shopping-item${checked?' checked':''}" id="si-${ckid}">
        <input type="checkbox" id="${ckid}" ${checked} onchange="toggleCheck('${ckid}')"/>
        <label for="${ckid}">${ing.name}${qtyStr ? ' — ' + qtyStr : ''}</label>
      </div>`;
    }).join('');

    content.innerHTML = `
      <h3 style="font-family:'Playfair Display',serif;margin-bottom:1rem;font-size:1.1rem">Meals this week</h3>
      <div class="shopping-meals">${mealsList}</div>
      <h3 style="font-family:'Playfair Display',serif;margin-bottom:1rem;font-size:1.1rem">🛒 Shopping List</h3>
      <div class="shopping-list">
        <div class="shopping-category">
          <div class="shopping-category-title">🧺 All Ingredients</div>
          ${items}
        </div>
      </div>`;
  }

  window.toggleCheck = function(id) {
    checkedItems[id] = !checkedItems[id];
    const si = document.getElementById('si-' + id);
    if (si) si.classList.toggle('checked', checkedItems[id]);
  };

  // ── INIT ──
  async function init() {
    await Promise.all([loadRecipes(), loadMealPlan()]);
    renderShoppingWeekSelector();
  }

  init();
</script>
</body>
</html>
